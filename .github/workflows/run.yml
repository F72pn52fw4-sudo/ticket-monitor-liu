name: 海航PLUS199特价票全自动监控
on:
  schedule:
    - cron: '*/8 * * * *'
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 安装Chrome浏览器和驱动
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver
      - name: 设置Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 安装依赖
        run: pip install selenium requests
      - name: 启动监控
        env:
          HNA_ACCOUNT: ${{ secrets.HNA_ACCOUNT }}
          HNA_PASSWORD: ${{ secrets.HNA_PASSWORD }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python monitor.py
