name: 海航PLUS199特价票全自动监控
on:
  schedule:
    - cron: '*/8 * * * *'  # 每8分钟查一次，不触发风控
  workflow_dispatch:        # 可手动运行

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 配置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 安装依赖
        run: pip install selenium webdriver-manager requests undetected-chromedriver
      - name: 运行监控
        env:
          HNA_ACCOUNT: ${{ secrets.HNA_ACCOUNT }}
          HNA_PASSWORD: ${{ secrets.HNA_PASSWORD }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python monitor.py
