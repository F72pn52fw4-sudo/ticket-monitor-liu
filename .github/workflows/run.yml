name: 机票监控定时任务
on:
  schedule:
    - cron: '58 1 * * *'   # 北京时间 9:58（UTC 1:58）
    - cron: '03 2 * * *'   # 北京时间 10:03（UTC 2:03）
    - cron: '08 2 * * *'   # 北京时间 10:08（UTC 2:08）
    - cron: '13 2 * * *'   # 北京时间 10:13（UTC 2:13）
    - cron: '18 2 * * *'   # 北京时间 10:18（UTC 2:18）
    - cron: '23 2 * * *'   # 北京时间 10:23（UTC 2:23）
    - cron: '28 2 * * *'   # 北京时间 10:28（UTC 2:28）
    - cron: '30 2 * * *'   # 北京时间 10:30（UTC 2:30，结束节点）
  workflow_dispatch:      # 允许手动运行

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 安装依赖
        run: pip install requests
      - name: 运行机票查询
        run: python ticket.py
