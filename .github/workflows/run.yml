name: 海航PLUS199特价票API监控
on:
  schedule:
    - cron: '*/8 * * * *'  # 每8分钟查一次
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 设置Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 安装依赖
        run: pip install requests
      - name: 启动监控
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          JSESSIONID: ${{ secrets.HNA_SESSION }}  # 这里依然用你之前的HNA_SESSION密钥
        run: python api_monitor.py
